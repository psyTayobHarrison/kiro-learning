<div class="card">
  <h2>Add Expense</h2>

  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="amount">Amount</label>
      <input
        id="amount"
        type="number"
        formControlName="amount"
        step="0.01"
        placeholder="0.00"
        [class.invalid]="isFieldInvalid('amount')"
      />
      <div class="error" *ngIf="isFieldInvalid('amount')">
        <span *ngIf="expenseForm.get('amount')?.errors?.['required']">Amount is required.</span>
        <span *ngIf="expenseForm.get('amount')?.errors?.['min']">Amount must be at least 0.01.</span>
        <span *ngIf="expenseForm.get('amount')?.errors?.['max']">Amount must not exceed 999,999,999.99.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <input
        id="category"
        type="text"
        formControlName="category"
        placeholder="e.g. Groceries"
        [class.invalid]="isFieldInvalid('category')"
      />
      <div class="error" *ngIf="isFieldInvalid('category')">
        <span *ngIf="expenseForm.get('category')?.errors?.['required']">Category is required.</span>
        <span *ngIf="expenseForm.get('category')?.errors?.['maxlength']">Category must not exceed 50 characters.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input
        id="date"
        type="date"
        formControlName="date"
        [class.invalid]="isFieldInvalid('date')"
      />
      <div class="error" *ngIf="isFieldInvalid('date')">
        <span *ngIf="expenseForm.get('date')?.errors?.['required']">Date is required.</span>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description (optional)</label>
      <input
        id="description"
        type="text"
        formControlName="description"
        placeholder="Add a description"
      />
      <div class="error" *ngIf="isFieldInvalid('description')">
        <span *ngIf="expenseForm.get('description')?.errors?.['maxlength']">Description must not exceed 255 characters.</span>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="submitting">
      {{ submitting ? 'Adding...' : 'Add Expense' }}
    </button>
  </form>
</div>
