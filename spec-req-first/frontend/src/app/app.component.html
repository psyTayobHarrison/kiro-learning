<div class="app-container">
  <header class="app-header">
    <h1>{{ title }}</h1>
  </header>
  <nav class="tab-bar">
    <button class="tab-button" [class.active]="activeTab === 'expenses'" (click)="activeTab = 'expenses'">Expenses</button>
    <button class="tab-button" [class.active]="activeTab === 'budgets'" (click)="activeTab = 'budgets'">Budgets</button>
  </nav>
  <div class="app-content" *ngIf="activeTab === 'expenses'">
    <app-expense-form (expenseCreated)="onExpenseCreated()"></app-expense-form>
    <app-category-filter [categories]="categories" (categorySelected)="onCategorySelected($event)"></app-category-filter>
    <app-expense-list [expenses]="expenses" (expenseDeleted)="onExpenseDeleted()" (expenseUpdated)="onExpenseUpdated()"></app-expense-list>
    <app-spending-summary [summaries]="summaries"></app-spending-summary>
  </div>
  <app-budgets-tab *ngIf="activeTab === 'budgets'"></app-budgets-tab>
</div>
