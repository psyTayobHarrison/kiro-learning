<div class="expense-form">
  <h2>{{ isEditing ? 'Edit Expense' : 'Add New Expense' }}</h2>
  <form (ngSubmit)="onSubmit()" #expenseForm="ngForm">
    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount *</label>
        <input
          type="number"
          id="amount"
          name="amount"
          [(ngModel)]="expense.amount"
          required
          min="0.01"
          step="0.01"
          placeholder="0.00">
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <input
          type="text"
          id="category"
          name="category"
          [(ngModel)]="expense.category"
          required
          placeholder="e.g. Food, Transport">
      </div>

      <div class="form-group">
        <label for="date">Date *</label>
        <input
          type="date"
          id="date"
          name="date"
          [(ngModel)]="expense.date"
          required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <input
          type="text"
          id="description"
          name="description"
          [(ngModel)]="expense.description"
          placeholder="Optional description">
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!expenseForm.valid">
        {{ isEditing ? 'Update' : 'Add Expense' }}
      </button>
      <button *ngIf="isEditing" type="button" class="btn btn-secondary" (click)="onCancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
