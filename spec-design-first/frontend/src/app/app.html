<main class="app-container">
  <h1>Budget Tracker</h1>

  <nav class="tab-bar">
    <button
      [class.active]="activeTab === 'expenses'"
      (click)="activeTab = 'expenses'">Expenses</button>
    <button
      [class.active]="activeTab === 'budgets'"
      (click)="activeTab = 'budgets'">Budgets</button>
  </nav>

  @if (activeTab === 'expenses') {
    <app-expense-form
      [expenseToEdit]="expenseToEdit"
      (expenseSaved)="onExpenseSaved()">
    </app-expense-form>

    <app-category-filter (filterChanged)="onFilterChanged($event)"></app-category-filter>

    <app-expense-list
      [expenses]="expenses"
      (editExpense)="onEditExpense($event)"
      (deleteExpense)="onDeleteExpense($event)">
    </app-expense-list>

    <app-summary-view [summary]="summary"></app-summary-view>
  }

  @if (activeTab === 'budgets') {
    <app-budgets-tab></app-budgets-tab>
  }
</main>
